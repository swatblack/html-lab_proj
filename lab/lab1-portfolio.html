		<h1>Портфолио</h1>
		<div id="cardcontainer">
			<figure>
				<figcaption>Мод на новые виды головных уборов</figcaption>
				<img src="mod1.png" class="modimg">
				<p class="cardtext">Мод для игры Barotrauma, добавляющий эстетичные головные уборы для игроков. При создании были задействованны навыки XML, редактирование существующих игровых спрайтов и немного дизайна для оформления страницы мода в Steam.</p>
				<a target="_blank" href="https://steamcommunity.com/sharedfiles/filedetails/?id=2948012577">Страница мода</a>
			</figure>
			<figure>
				<figcaption>Мод Rimworld: "Имлантированные двигатели"</figcaption>
				<img src="mod2.png" class="modimg">
				<p class="cardtext">Мод для игры Rimworld, добавляющий имплант, аннулирующий замедления от рельефа для персонажей, в которых он был установлен. При создании были задействованны навыки XML и немного C#.</p>
				<a target="_blank" href="https://steamcommunity.com/sharedfiles/filedetails/?id=3004131449">Страница мода</a>
			</figure>
			<figure id="centerintablet">
				<figcaption>Карта Team Fortress 2 "Bothunt"</figcaption>
				<img src="mod3.png" class="modimg">
				<p class="cardtext">Карта для игры Team Fortress 2, позволяющая игрокам потренировать свои снайперские навыки путём расстрелла ботов с безопасного места. При создании был изучен инструмент создания карт Hammer++.</p>
				<a target="_blank" href="https://gamebanana.com/mods/421092">Страница мода</a>
			</figure>
		</div>
		<h2>А теперь - калькулятор для демонстрации моих навыков Javascript.</h2>
		<div id="calculator">
			<div id="calcdisplay"><span id="calcoutput"></span></div>
			<input type="button" class="calcbutton" id="calcC" value="C" onclick="clearCalc()"></input>
			<input type="button" class="calcbuttona" value="." onclick="addValue('.')"></input>
			<input type="button" class="calcbuttona" value="+" onclick="addValue('+')"></input>
			<input type="button" class="calcbutton" value="1" onclick="addValue('1')"></input>
			<input type="button" class="calcbutton" value="2" onclick="addValue('2')"></input>
			<input type="button" class="calcbutton" value="3" onclick="addValue('3')"></input>
			<input type="button" class="calcbuttona" value="-" onclick="addValue('-')"></input>
			<input type="button" class="calcbutton" value="4" onclick="addValue('4')"></input>
			<input type="button" class="calcbutton" value="5" onclick="addValue('5')"></input>
			<input type="button" class="calcbutton" value="6" onclick="addValue('6')"></input>
			<input type="button" class="calcbuttona" value="*" onclick="addValue('*')"></input>
			<input type="button" class="calcbutton" value="7" onclick="addValue('7')"></input>
			<input type="button" class="calcbutton" value="8" onclick="addValue('8')"></input>
			<input type="button" class="calcbutton" value="9" onclick="addValue('9')"></input>
			<input type="button" class="calcbuttona" value="/" onclick="addValue('/')"></input>
			<input type="button" class="calcbutton" id="calc0" value="0" onclick="addValue('0')"></input>
			<input type="button" class="calcbuttona" value="=" onclick="calculate()"></input>
